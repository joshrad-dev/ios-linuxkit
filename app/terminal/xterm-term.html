<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="height=device-height, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<link rel="stylesheet" href="xterm-vendor/xterm.css">
<link rel="stylesheet" href="term.css">
<div id="terminal"></div>
<script>
(() => {
    const log = (message) => {
        try {
            window.webkit?.messageHandlers?.log?.postMessage(message);
        } catch (error) {
        }
    };
    window.__terminalBootstrapLog = log;
    window.addEventListener('error', (event) => {
        log(`terminal bootstrap error: ${event.message} @ ${event.filename}:${event.lineno}:${event.colno}`);
    });
    window.addEventListener('unhandledrejection', (event) => {
        log(`terminal bootstrap rejection: ${event.reason?.stack || event.reason}`);
    });
})();
</script>
<script src="xterm-vendor/xterm.mjs"
    onerror="window.__terminalBootstrapLog && window.__terminalBootstrapLog('terminal xterm script failed to load')"></script>
<script src="xterm-vendor/addon-fit.mjs"
    onerror="window.__terminalBootstrapLog && window.__terminalBootstrapLog('terminal xterm fit addon failed to load')"></script>
<script src="xterm-vendor/addon-web-links.mjs"
    onerror="window.__terminalBootstrapLog && window.__terminalBootstrapLog('terminal xterm web-links addon failed to load')"></script>
<script src="xterm-vendor/addon-ligatures.mjs"
    onerror="window.__terminalBootstrapLog && window.__terminalBootstrapLog('terminal xterm ligatures addon failed to load')"></script>
<script src="xterm-vendor/addon-canvas.js"
    onerror="window.__terminalBootstrapLog && window.__terminalBootstrapLog('terminal xterm canvas addon failed to load')"></script>
<script src="xterm-term-bridge.js"
    onerror="window.__terminalBootstrapLog && window.__terminalBootstrapLog('terminal xterm bridge script failed to load')"></script>
